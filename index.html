<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Efeito Hover na Imagem</title>
  <style>
    /* Reset básico e centralização na tela */
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #be2222;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Container principal do Card */
    .card-container {
      position: relative;
      width: 350px;
      height: 450px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      overflow: hidden; /* Garante que nada saia do retângulo principal */
      background: linear-gradient(45deg, #4a0505, #6d0b0b); /* Fundo do texto */
    }

    /* Estilo da Imagem */
    .card-image {
      position: absolute;
      top: 0;
      right: 0; /* Alinhada à direita */
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2; /* Começa cobrindo tudo */
      transition: width 0.5s ease, transform 0.5s ease;
    }

    /* Camada do Texto (Fica fixa no lado esquerdo) */
    .card-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%; /* Ocupa apenas a metade esquerda */
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      color: #ffffff;
      z-index: 1;
      
      /* Estado inicial do texto: invisível e ligeiramente transparente */
      opacity: 0;
      transition: opacity 0.4s ease 0.1s; /* Pequeno delay para sincronizar com a imagem */
    }

    /* Textos dentro do overlay */
    .card-title {
      font-size: 1.2rem;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      border-bottom: 2px solid #be2222;
      padding-bottom: 5px;
      width: 100%;
    }

    .card-text {
      font-size: 0.75rem; /* Ajustado para caber perfeitamente na metade do espaço */
      text-align: justify;
      line-height: 1.4;
      opacity: 0.95;
      margin: 0;
    }

    /* ==========================================
       MÁGICA DO HOVER (Tudo dentro do retângulo)
       ========================================== */

    /* 1. Quando passa o mouse, a imagem encolhe para a metade (50%) e vai para a direita */
    .card-container:hover .card-image {
      width: 50%;
    }

    /* 2. O texto surge do lado esquerdo que foi liberado */
    .card-container:hover .card-overlay {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <img src="1.png" alt="Capitã Marvel" class="card-image">
    
    <div class="card-overlay">
      <h3 class="card-title">Capitã Marvel</h3>
      <p class="card-text">Carol Danvers fundiu seu DNA com genes Kree após um acidente cósmico. Inicialmente Miss Marvel, evoluiu para Binária após perder as memórias para Vampira. Em 2012, assumiu o manto de Capitã Marvel, tornando-se líder cósmica dos Vingadores.</p>
    </div>
  </div>

</body>
</html>
